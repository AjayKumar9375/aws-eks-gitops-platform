apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: allowed-registries
spec:
  validationFailureAction: enforce
  rules:
  - name: only-ecr
    match:
      resources:
        kinds:
        - Pod
    validate:
      message: "Images must come from ECR"
      pattern:
        spec:
          containers:
          - image: "205474063511.dkr.ecr.us-east-1.amazonaws.com/*"
