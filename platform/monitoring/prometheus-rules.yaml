apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-api-rules
  namespace: monitoring
spec:
  groups:
  - name: demo-api.rules
    rules:
    - alert: DemoApiHighErrorRate
      expr: rate(http_requests_total{job="demo-api",status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High 5xx error rate in demo-api"
