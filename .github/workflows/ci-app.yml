name: demo-api-ci

on:
  pull_request:
    paths:
      - services/demo-api/**
      - .github/workflows/ci-app.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Spotless check
        run: make lint
      - name: Unit tests
        run: make test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: services/demo-api
          severity: HIGH,CRITICAL
          exit-code: "1"
