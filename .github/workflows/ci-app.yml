name: demo-api-ci

on:
  pull_request:
    paths:
      - services/demo-api/**
      - pyproject.toml
      - .github/workflows/ci-app.yml

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/demo-api/dev-requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/demo-api/dev-requirements.txt
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: services/demo-api
          severity: HIGH,CRITICAL
          exit-code: "1"
