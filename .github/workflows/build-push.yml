name: demo-api-build-push

on:
  push:
    branches: ["master"]
    paths:
      - services/demo-api/**
      - scripts/bump-image-tag.ps1
      - .github/workflows/build-push.yml
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to ECR and update GitOps overlay"
        required: true
        default: true
        type: boolean
      image_tag:
        description: "Optional image tag override (defaults to commit SHA)"
        required: false
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPO: ${{ vars.ECR_REPO }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate required CI settings
        run: |
          test -n "${{ secrets.AWS_ROLE_ARN }}" || (echo "Missing secret: AWS_ROLE_ARN" && exit 1)
          test -n "$AWS_REGION" || (echo "Missing repository variable: AWS_REGION" && exit 1)
          test -n "$ECR_REPO" || (echo "Missing repository variable: ECR_REPO" && exit 1)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG services/demo-api
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.push_image }}" = "true" ]; then
            docker push $ECR_REPO:$IMAGE_TAG
          else
            echo "Skipping image push (manual run with push_image=false)."
          fi
      - name: Update GitOps image tag
        if: github.event_name == 'push' || inputs.push_image == true
        run: pwsh ./scripts/bump-image-tag.ps1 -Tag ${{ env.IMAGE_TAG }} -Overlay dev
      - name: Check for GitOps changes
        id: gitops-changes
        run: |
          if git diff --quiet -- gitops/apps/overlays/dev; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit GitOps update
        if: (github.event_name == 'push' || inputs.push_image == true) && steps.gitops-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gitops/apps/overlays/dev
          git commit -m "chore: promote demo-api ${IMAGE_TAG}"
          git push
